name: Build Polaris with gvenc fix (Toolchain Bundle)

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
      with:
        repository: guoyaya369/Polaris-Obfuscator-guoyaya
        ref: main

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake

    - name: Configure CMake
      run: |
        cmake -S src/llvm -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang" \
          -DLLVM_TARGETS_TO_BUILD="X86" \
          -DLLVM_ENABLE_ASSERTIONS=Off \
          -DLLVM_INSTALL_TOOLCHAIN_ONLY=OFF

    - name: Build clang
      run: ninja -C build clang

    - name: Bundle toolchain (clang + resources)
      run: |
        mkdir -p upload/clang
        cp build/bin/clang upload/clang/
        cp -r build/lib/clang upload/lib/ 2>/dev/null || true
    
    - uses: actions/upload-artifact@v4
      with:
        name: polaris-linux-full-toolchain
        path: upload/
