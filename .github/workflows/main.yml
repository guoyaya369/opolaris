name: Build Polaris with gvenc fix (Full Toolchain)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Polaris-Obfuscator-guoyaya
        uses: actions/checkout@v4
        with:
          repository: guoyaya369/Polaris-Obfuscator-guoyaya
          ref: feature/mir   # ✅ 唯一关键改动
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            clang lld \
            python3 \
            zip unzip

      - name: Configure LLVM/Clang
        run: |
          cmake -S src/llvm -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang" \
            -DLLVM_TARGETS_TO_BUILD="X86" \
            -DLLVM_ENABLE_ASSERTIONS=Off \
            -DLLVM_ENABLE_PLUGINS=ON \
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build LLVM/Clang
        run: |
          ninja -C build clang
          ninja -C build install

      - name: Package full toolchain
        run: |
          mkdir -p upload
          cp -r install/* upload/

      - name: Upload Polaris full toolchain
        uses: actions/upload-artifact@v4
        with:
          name: polaris-linux-full-toolchain
          path: upload/
